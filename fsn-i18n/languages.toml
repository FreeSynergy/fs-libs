# languages.toml — Language metadata for fsn-i18n
#
# Keys: ISO 639-1 language codes (+ "yue" for Cantonese).
# Fields:
#   name        — English display name
#   native_name — Name in the language itself
#   script      — Writing system name
#   direction   — "ltr" (left-to-right) or "rtl" (right-to-left)

