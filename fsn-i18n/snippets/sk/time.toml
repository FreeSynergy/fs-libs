# time.toml — Relative time expressions (Slovak)

[time]
just_now = "práve teraz"
seconds_ago = "pred {n} sekundami"
minutes_ago = "pred {n} minútami"
hours_ago = "pred {n} hodinami"
days_ago = "pred {n} dňami"
weeks_ago = "pred {n} týždňami"
months_ago = "pred {n} mesiacmi"
years_ago = "pred {n} rokmi"
today = "dnes"
yesterday = "včera"
tomorrow = "zajtra"
never = "nikdy"

