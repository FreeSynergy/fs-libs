# time.toml — Relative and absolute time expressions (Danish)

[time]
just_now = "Lige nu"
seconds_ago = "for {n} sekunder siden"
minutes_ago = "for {n} minutter siden"
hours_ago = "for {n} timer siden"
days_ago = "for {n} dage siden"
weeks_ago = "for {n} uger siden"
months_ago = "for {n} måneder siden"
years_ago = "for {n} år siden"
today = "I dag"
yesterday = "I går"
tomorrow = "I morgen"
never = "Aldrig"

