# validation.toml — Form validation messages (Basa Jawa)

[validation]
required = "Field wajib"
too_short = "Kependhekan (minimal: {min} karakter)"
too_long = "Kepanjangen (maksimal: {max} karakter)"
invalid_email = "Alamat email ora valid"
invalid_url = "URL ora valid"
invalid_format = "Format ora valid"
out_of_range = "Nilai ing njaba rentang"
pattern_mismatch = "Ora cocog karo pola sing dibutuhake"
already_exists = "Wis ana"
not_found = "Ora ketemu"

