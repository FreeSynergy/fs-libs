too_short = "Troppo corto (minimo: {min} caratteri)"
too_long = "Troppo lungo (massimo: {max} caratteri)"
invalid_email = "Indirizzo e-mail non valido"
invalid_url = "URL non valido"
invalid_format = "Formato non valido"
out_of_range = "Valore fuori intervallo"
pattern_mismatch = "Non corrisponde al modello richiesto"
already_exists = "Esiste già"
not_found = "Non trovato"

