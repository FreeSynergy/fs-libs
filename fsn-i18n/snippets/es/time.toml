# time.toml — Relative time expressions (Spanish)

[time]
just_now = "ahora mismo"
seconds_ago = "hace {n} segundos"
minutes_ago = "hace {n} minutos"
hours_ago = "hace {n} horas"
days_ago = "hace {n} días"
weeks_ago = "hace {n} semanas"
months_ago = "hace {n} meses"
years_ago = "hace {n} años"
today = "hoy"
yesterday = "ayer"
tomorrow = "mañana"
never = "nunca"

