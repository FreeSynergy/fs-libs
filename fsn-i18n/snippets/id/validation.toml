# validation.toml — Pesan validasi input (Bahasa Indonesia)

[validation]
required         = "Kolom wajib diisi"
too_short        = "Terlalu pendek (minimum: {min} karakter)"
too_long         = "Terlalu panjang (maksimum: {max} karakter)"
invalid_email    = "Alamat email tidak valid"
invalid_url      = "URL tidak valid"
invalid_format   = "Format tidak valid"
out_of_range     = "Nilai di luar rentang"
pattern_mismatch = "Tidak cocok dengan pola yang diperlukan"
already_exists   = "Sudah ada"
not_found        = "Tidak ditemukan"

