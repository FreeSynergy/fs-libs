# validation.toml — Input validation messages (Albanian)

[validation]
required = "Fusha e kërkuar"
too_short = "Shumë e shkurtër (minimumi: {min} karaktere)"
too_long = "Shumë e gjatë (maksimumi: {max} karaktere)"
invalid_email = "Adresë emaili e pavlefshme"
invalid_url = "URL e pavlefshme"
invalid_format = "Format i pavlefshëm"
out_of_range = "Vlera jashtë diapazonit"
