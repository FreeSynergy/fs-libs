# validation.toml — 驗證訊息 (Cantonese)

[validation]
required         = "必填欄位"
too_short        = "太短（最少 {min} 個字元）"
too_long         = "太長（最多 {max} 個字元）"
invalid_email    = "電郵地址無效"
invalid_url      = "URL 無效"
invalid_format   = "格式無效"
out_of_range     = "數值超出範圍"
pattern_mismatch = "唔符合所需格式"
already_exists   = "已經存在"
not_found        = "搵唔到"

