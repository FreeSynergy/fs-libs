# time.toml — relative time expressions (Persian / فارسی)

[time]
just_now     = "همین الان"
seconds_ago  = "{n} ثانیه پیش"
minutes_ago  = "{n} دقیقه پیش"
hours_ago    = "{n} ساعت پیش"
days_ago     = "{n} روز پیش"
weeks_ago    = "{n} هفته پیش"
months_ago   = "{n} ماه پیش"
years_ago    = "{n} سال پیش"
today        = "امروز"
yesterday    = "دیروز"
tomorrow     = "فردا"
never        = "هرگز"

