# time.toml — Relative time expressions (Punjabi)

[time]
just_now = "ਹੁਣੇ"
seconds_ago = "{n} ਸਕਿੰਟ ਪਹਿਲਾਂ"
minutes_ago = "{n} ਮਿੰਟ ਪਹਿਲਾਂ"
hours_ago = "{n} ਘੰਟੇ ਪਹਿਲਾਂ"
days_ago = "{n} ਦਿਨ ਪਹਿਲਾਂ"
weeks_ago = "{n} ਹਫ਼ਤੇ ਪਹਿਲਾਂ"
months_ago = "{n} ਮਹੀਨੇ ਪਹਿਲਾਂ"
years_ago = "{n} ਸਾਲ ਪਹਿਲਾਂ"
today = "ਅੱਜ"
yesterday = "ਕੱਲ੍ਹ"
tomorrow = "ਕੱਲ੍ਹ"
never = "ਕਦੇ ਨਹੀਂ"

