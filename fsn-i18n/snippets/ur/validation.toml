# validation.toml — form validation messages (Urdu / اردو)

[validation]
required          = "ضروری خانہ"
too_short         = "بہت چھوٹا (کم از کم: {min} حروف)"
too_long          = "بہت لمبا (زیادہ سے زیادہ: {max} حروف)"
invalid_email     = "غلط ای میل پتہ"
invalid_url       = "غلط URL"
invalid_format    = "غلط فارمیٹ"
out_of_range      = "قدر حد سے باہر"
pattern_mismatch  = "مطلوبہ نمونے سے میل نہیں کھاتا"
already_exists    = "پہلے سے موجود ہے"
not_found         = "نہیں ملا"

