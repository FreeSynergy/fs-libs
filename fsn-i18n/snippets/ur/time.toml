# time.toml — relative time expressions (Urdu / اردو)

[time]
just_now     = "ابھی ابھی"
seconds_ago  = "{n} سیکنڈ پہلے"
minutes_ago  = "{n} منٹ پہلے"
hours_ago    = "{n} گھنٹے پہلے"
days_ago     = "{n} دن پہلے"
weeks_ago    = "{n} ہفتے پہلے"
months_ago   = "{n} مہینے پہلے"
years_ago    = "{n} سال پہلے"
today        = "آج"
yesterday    = "کل"
tomorrow     = "کل"
never        = "کبھی نہیں"

