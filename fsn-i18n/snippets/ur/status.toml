error         = "خرابی"
loading       = "لوڈ ہو رہا ہے"
syncing       = "ہم آہنگ ہو رہا ہے"
paused        = "معطل"
degraded      = "خراب حالت"
healthy       = "صحت مند"
unhealthy     = "غیر صحت مند"
pending       = "زیر التواء"
active        = "فعال"
inactive      = "غیر فعال"
locked        = "مقفل"
expired       = "میعاد ختم"
connected     = "منسلک"
disconnected  = "غیر منسلک"
updating      = "اپ ڈیٹ ہو رہا ہے"
installing    = "انسٹال ہو رہا ہے"
unknown       = "نامعلوم"

