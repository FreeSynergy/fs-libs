# time.toml — relative time expressions (Belarusian)

[time]
just_now     = "толькі што"
seconds_ago  = "{n} секунд таму"
minutes_ago  = "{n} хвілін таму"
hours_ago    = "{n} гадзін таму"
days_ago     = "{n} дзён таму"
weeks_ago    = "{n} тыдняў таму"
months_ago   = "{n} месяцаў таму"
years_ago    = "{n} гадоў таму"
today        = "сёння"
yesterday    = "учора"
tomorrow     = "заўтра"
never        = "ніколі"

