# time.toml — Relative and absolute time expressions (Telugu)

[time]
just_now = "ఇప్పుడే"
seconds_ago = "{n} సెకన్ల క్రితం"
minutes_ago = "{n} నిమిషాల క్రితం"
hours_ago = "{n} గంటల క్రితం"
days_ago = "{n} రోజుల క్రితం"
weeks_ago = "{n} వారాల క్రితం"
months_ago = "{n} నెలల క్రితం"
years_ago = "{n} సంవత్సరాల క్రితం"
today = "ఈరోజు"
yesterday = "నిన్న"
tomorrow = "రేపు"
never = "ఎప్పుడూ లేదు"

