# validation.toml — Input validation messages (Telugu)

[validation]
required = "అవసరమైన ఫీల్డ్"
too_short = "చాలా చిన్నది (కనీసం: {min} అక్షరాలు)"
too_long = "చాలా పొడవు (గరిష్టం: {max} అక్షరాలు)"
invalid_email = "చెల్లని ఇమెయిల్ చిరునామా"
invalid_url = "చెల్లని URL"
invalid_format = "చెల్లని ఫార్మాట్"
out_of_range = "విలువ పరిధి వెలుపల"
pattern_mismatch = "అవసరమైన నమూనాతో సరిపోలలేదు"
already_exists = "ఇప్పటికే ఉంది"
not_found = "కనుగొనబడలేదు"

