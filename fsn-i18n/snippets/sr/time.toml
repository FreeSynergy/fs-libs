# time.toml — relative time expressions (Serbian)

[time]
just_now     = "управо сада"
seconds_ago  = "пре {n} секунди"
minutes_ago  = "пре {n} минута"
hours_ago    = "пре {n} сати"
days_ago     = "пре {n} дана"
weeks_ago    = "пре {n} недеља"
months_ago   = "пре {n} месеци"
years_ago    = "пре {n} година"
today        = "данас"
yesterday    = "јуче"
tomorrow     = "сутра"
never        = "никада"

