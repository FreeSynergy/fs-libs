# validation.toml — Thông báo xác thực (Vietnamese)

[validation]
required         = "Trường bắt buộc"
too_short        = "Quá ngắn (tối thiểu {min} ký tự)"
too_long         = "Quá dài (tối đa {max} ký tự)"
invalid_email    = "Địa chỉ email không hợp lệ"
invalid_url      = "URL không hợp lệ"
invalid_format   = "Định dạng không hợp lệ"
out_of_range     = "Giá trị ngoài phạm vi"
pattern_mismatch = "Không khớp với mẫu yêu cầu"
already_exists   = "Đã tồn tại"
not_found        = "Không tìm thấy"

