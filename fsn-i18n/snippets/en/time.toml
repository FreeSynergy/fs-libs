# time.toml — Time and date labels (English)

[time]
now          = "Just now"
never        = "Never"
today        = "Today"
yesterday    = "Yesterday"
tomorrow     = "Tomorrow"
seconds_ago  = "{n}s ago"
minutes_ago  = "{n}m ago"
hours_ago    = "{n}h ago"
days_ago     = "{n}d ago"
in_seconds   = "in {n}s"
in_minutes   = "in {n}m"
in_hours     = "in {n}h"
in_days      = "in {n}d"
last_seen    = "Last seen {when}"
created_at   = "Created {when}"
updated_at   = "Updated {when}"
expires_at   = "Expires {when}"
uptime       = "Uptime: {duration}"
