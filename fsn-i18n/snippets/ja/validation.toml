# validation.toml — 入力バリデーションメッセージ (Japanese)

[validation]
required         = "必須フィールド"
too_short        = "短すぎます（最小: {min}文字）"
too_long         = "長すぎます（最大: {max}文字）"
invalid_email    = "メールアドレスが無効です"
invalid_url      = "URLが無効です"
invalid_format   = "形式が無効です"
out_of_range     = "値が範囲外です"
pattern_mismatch = "必要なパターンと一致しません"
already_exists   = "すでに存在します"
not_found        = "見つかりません"

