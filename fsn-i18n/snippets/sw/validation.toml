# validation.toml — Validation messages (Swahili)

[validation]
required = "Sehemu inayohitajika"
too_short = "Fupi sana (kiwango cha chini: herufi {min})"
too_long = "Ndefu sana (kiwango cha juu: herufi {max})"
invalid_email = "Anwani ya barua pepe si sahihi"
invalid_url = "URL si sahihi"
invalid_format = "Muundo si sahihi"
out_of_range = "Thamani iko nje ya mipaka"
pattern_mismatch = "Hailingani na muundo unaohitajika"
already_exists = "Tayari ipo"
not_found = "Haikupatikana"

