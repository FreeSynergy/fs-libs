# time.toml — Relative and absolute time expressions (Tamil)

[time]
just_now = "இப்போதுதான்"
seconds_ago = "{n} விநாடிகளுக்கு முன்"
minutes_ago = "{n} நிமிடங்களுக்கு முன்"
hours_ago = "{n} மணி நேரங்களுக்கு முன்"
days_ago = "{n} நாட்களுக்கு முன்"
weeks_ago = "{n} வாரங்களுக்கு முன்"
months_ago = "{n} மாதங்களுக்கு முன்"
years_ago = "{n} ஆண்டுகளுக்கு முன்"
today = "இன்று"
yesterday = "நேற்று"
tomorrow = "நாளை"
never = "ஒருபோதும் இல்லை"

