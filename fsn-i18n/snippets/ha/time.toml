# time.toml — Relative time expressions (Hausa)

[time]
just_now = "yanzu haka"
seconds_ago = "daƙiƙa {n} da suka wuce"
minutes_ago = "mintuna {n} da suka wuce"
hours_ago = "sa'o'i {n} da suka wuce"
days_ago = "kwanaki {n} da suka wuce"
weeks_ago = "makonni {n} da suka wuce"
months_ago = "watanni {n} da suka wuce"
years_ago = "shekaru {n} da suka wuce"
today = "yau"
yesterday = "jiya"
tomorrow = "gobe"
never = "ba za a taɓa ba"

