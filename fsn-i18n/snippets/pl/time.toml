# time.toml — Relative time expressions (Polish)

[time]
just_now = "przed chwilą"
seconds_ago = "{n} sekund temu"
minutes_ago = "{n} minut temu"
hours_ago = "{n} godzin temu"
days_ago = "{n} dni temu"
weeks_ago = "{n} tygodni temu"
months_ago = "{n} miesięcy temu"
years_ago = "{n} lat temu"
today = "dzisiaj"
yesterday = "wczoraj"
tomorrow = "jutro"
never = "nigdy"

