# time.toml — Relative time expressions (Marathi)

[time]
just_now = "आत्ताच"
seconds_ago = "{n} सेकंदांपूर्वी"
minutes_ago = "{n} मिनिटांपूर्वी"
hours_ago = "{n} तासांपूर्वी"
days_ago = "{n} दिवसांपूर्वी"
weeks_ago = "{n} आठवड्यांपूर्वी"
months_ago = "{n} महिन्यांपूर्वी"
years_ago = "{n} वर्षांपूर्वी"
today = "आज"
yesterday = "काल"
tomorrow = "उद्या"
never = "कधीच नाही"

