# time.toml — Relative time expressions (Estonian)

[time]
just_now     = "just nüüd"
seconds_ago  = "{n} sekundit tagasi"
minutes_ago  = "{n} minutit tagasi"
hours_ago    = "{n} tundi tagasi"
days_ago     = "{n} päeva tagasi"
weeks_ago    = "{n} nädalat tagasi"
months_ago   = "{n} kuud tagasi"
years_ago    = "{n} aastat tagasi"
today        = "täna"
yesterday    = "eile"
tomorrow     = "homme"
never        = "mitte kunagi"

