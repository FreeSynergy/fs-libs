# time.toml — Relative time expressions (Greek)

[time]
just_now = "μόλις τώρα"
seconds_ago = "πριν {n} δευτερόλεπτα"
minutes_ago = "πριν {n} λεπτά"
hours_ago = "πριν {n} ώρες"
days_ago = "πριν {n} μέρες"
weeks_ago = "πριν {n} εβδομάδες"
months_ago = "πριν {n} μήνες"
years_ago = "πριν {n} χρόνια"
today = "σήμερα"
yesterday = "χθες"
tomorrow = "αύριο"
never = "ποτέ"

