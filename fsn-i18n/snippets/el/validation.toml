# validation.toml — Form validation messages (Greek)

[validation]
required = "Υποχρεωτικό πεδίο"
too_short = "Πολύ σύντομο (ελάχιστο: {min} χαρακτήρες)"
too_long = "Πολύ μακρύ (μέγιστο: {max} χαρακτήρες)"
invalid_email = "Μη έγκυρη διεύθυνση email"
invalid_url = "Μη έγκυρο URL"
invalid_format = "Μη έγκυρη μορφή"
out_of_range = "Η τιμή εκτός εύρους"
pattern_mismatch = "Δεν ταιριάζει με το απαιτούμενο μοτίβο"
already_exists = "Υπάρχει ήδη"
not_found = "Δεν βρέθηκε"

