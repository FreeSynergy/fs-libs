# time.toml — relative time labels (Bulgarian)

[time]
just_now     = "току-що"
seconds_ago  = "преди {n} секунди"
minutes_ago  = "преди {n} минути"
hours_ago    = "преди {n} часа"
days_ago     = "преди {n} дни"
weeks_ago    = "преди {n} седмици"
months_ago   = "преди {n} месеца"
years_ago    = "преди {n} години"
today        = "днес"
yesterday    = "вчера"
tomorrow     = "утре"
never        = "никога"

