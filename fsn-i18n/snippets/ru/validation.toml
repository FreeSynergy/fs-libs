# validation.toml — validation messages (Russian)

[validation]
required          = "Обязательное поле"
too_short         = "Слишком коротко (минимум: {min} символов)"
too_long          = "Слишком длинно (максимум: {max} символов)"
invalid_email     = "Неверный адрес электронной почты"
invalid_url       = "Неверный URL"
invalid_format    = "Неверный формат"
out_of_range      = "Значение вне диапазона"
pattern_mismatch  = "Не соответствует требуемому шаблону"
already_exists    = "Уже существует"
not_found         = "Не найдено"

