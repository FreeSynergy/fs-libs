# time.toml — Relative time expressions (Hindi)

[time]
just_now = "अभी"
seconds_ago = "{n} सेकंड पहले"
minutes_ago = "{n} मिनट पहले"
hours_ago = "{n} घंटे पहले"
days_ago = "{n} दिन पहले"
weeks_ago = "{n} सप्ताह पहले"
months_ago = "{n} महीने पहले"
years_ago = "{n} साल पहले"
today = "आज"
yesterday = "कल"
tomorrow = "कल"
never = "कभी नहीं"

