# status.toml — system/service status labels (Amharic)

[status]
online       = "በመስመር ላይ"
offline      = "ከመስመር ውጪ"
running      = "እየሰራ ነው"
stopped      = "ቆሟል"
error        = "ስህተት"
loading      = "እየጫነ ነው"
syncing      = "እያሳሰናጠረ ነው"
paused       = "ታግዷል"
degraded     = "አቅሙ ቀንሷል"
healthy      = "ጤናማ"
unhealthy    = "ጤናማ አይደለም"
pending      = "በመጠባበቅ ላይ"
active       = "ንቁ"
inactive     = "ቀዝቃዛ"
locked       = "ተቆልፏል"
expired      = "ጊዜው አልፏል"
connected    = "ተገናኝቷል"
disconnected = "ተቋርጧል"
updating     = "እየዘመነ ነው"
installing   = "እየተጫነ ነው"
unknown      = "አይታወቅም"

