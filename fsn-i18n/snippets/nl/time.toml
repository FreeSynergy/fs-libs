# time.toml — Relative and absolute time expressions (Dutch)

[time]
just_now = "Zojuist"
seconds_ago = "{n} seconden geleden"
minutes_ago = "{n} minuten geleden"
hours_ago = "{n} uur geleden"
days_ago = "{n} dagen geleden"
weeks_ago = "{n} weken geleden"
months_ago = "{n} maanden geleden"
years_ago = "{n} jaar geleden"
today = "Vandaag"
yesterday = "Gisteren"
tomorrow = "Morgen"
never = "Nooit"

