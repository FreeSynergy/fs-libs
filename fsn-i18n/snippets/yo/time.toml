# time.toml — Relative time expressions (Yoruba)

[time]
just_now = "ní ìsinsìnyí"
seconds_ago = "ìṣẹ́jú-aaya {n} sẹ́yìn"
minutes_ago = "ìṣẹ́jú {n} sẹ́yìn"
hours_ago = "wákàtí {n} sẹ́yìn"
days_ago = "ọjọ́ {n} sẹ́yìn"
weeks_ago = "ọ̀sẹ̀ {n} sẹ́yìn"
months_ago = "oṣù {n} sẹ́yìn"
years_ago = "ọdún {n} sẹ́yìn"
today = "òní"
yesterday = "àná"
tomorrow = "ọ̀la"
never = "rárá"

