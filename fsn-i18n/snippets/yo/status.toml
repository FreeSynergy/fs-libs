# status.toml — system/service status labels (Yoruba)

[status]
online       = "Lórí ìtọ́nà"
offline      = "Kò sí lórí ìtọ́nà"
running      = "Ń ṣiṣẹ́"
stopped      = "Ti dúró"
error        = "Àṣìṣe"
loading      = "Ń gba"
syncing      = "Ń ṣọ̀kan"
paused       = "Ti dáwọ́ dúró"
degraded     = "Ti rẹ̀wẹ̀sì"
healthy      = "Ní ìlera"
unhealthy    = "Kò ní ìlera"
pending      = "Ń dúró de"
active       = "Ń ṣiṣẹ́"
inactive     = "Kò ṣiṣẹ́"
locked       = "Ti tiì"
expired      = "Ti parí"
connected    = "Ti sopọ"
disconnected = "Ti ya sọtọ"
updating     = "Ń ṣe àtúnṣe"
installing   = "Ń fi sórí"
unknown      = "Àìmọ̀"

