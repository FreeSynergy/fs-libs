# validation.toml — Validation messages (Yoruba)

[validation]
required = "Aaye tí a nílò"
too_short = "Kúrú jù (ó kéré jù: àwọn ìwé {min})"
too_long = "Gùn jù (tó pọ̀ jù: àwọn ìwé {max})"
invalid_email = "Àdírẹ́sì ìmẹ́ẹ̀lì kò tọ́"
invalid_url = "URL kò tọ́"
invalid_format = "Ìkọ́ kò tọ́"
out_of_range = "Iye jáde nínú ìwọ̀n"
pattern_mismatch = "Kò bá àpẹẹrẹ tí a nílò mu"
already_exists = "Wà tẹ́lẹ̀"
not_found = "A kò rí i"

