# time.toml — Zaman ifadeleri (Türkçe)

[time]
just_now      = "şimdi"
seconds_ago   = "{n} saniye önce"
minutes_ago   = "{n} dakika önce"
hours_ago     = "{n} saat önce"
days_ago      = "{n} gün önce"
weeks_ago     = "{n} hafta önce"
months_ago    = "{n} ay önce"
years_ago     = "{n} yıl önce"
today         = "bugün"
yesterday     = "dün"
tomorrow      = "yarın"
never         = "hiçbir zaman"

