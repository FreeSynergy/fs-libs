# validation.toml — Validation messages for form fields (Swedish)

[validation]
required = "Det här fältet är obligatoriskt"
too_short = "För kort"
too_long = "För lång"
invalid_email = "Ogiltig e-postadress"
invalid_url = "Ogiltig URL"
invalid_format = "Ogiltigt format"
out_of_range = "Värdet är utanför intervallet"
