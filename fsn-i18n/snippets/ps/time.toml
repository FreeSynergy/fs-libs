# time.toml — relative time expressions (Pashto / پښتو)

[time]
just_now     = "همدا اوس"
seconds_ago  = "{n} ثانیې وړاندې"
minutes_ago  = "{n} دقیقې وړاندې"
hours_ago    = "{n} ساعتونه وړاندې"
days_ago     = "{n} ورځې وړاندې"
weeks_ago    = "{n} اونۍ وړاندې"
months_ago   = "{n} میاشتې وړاندې"
years_ago    = "{n} کاله وړاندې"
today        = "نن"
yesterday    = "پرون"
tomorrow     = "سبا"
never        = "هیڅکله"

