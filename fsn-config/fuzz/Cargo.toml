[package]
name    = "fsn-config-fuzz"
version = "0.0.1"
edition = "2021"
publish = false

[package.metadata]
cargo-fuzz = true

[dependencies]
libfuzzer-sys = "0.4"
fsn-config    = { path = ".." }
serde         = { version = "1", features = ["derive"] }
serde_json    = { version = "1" }
toml          = { version = "0.8" }

# Fuzz targets are compiled as binaries.
[[bin]]
name = "fuzz_parse_toml_value"
path = "fuzz_targets/fuzz_parse_toml_value.rs"
doc  = false

[[bin]]
name = "fuzz_parse_str_generic"
path = "fuzz_targets/fuzz_parse_str_generic.rs"
doc  = false
