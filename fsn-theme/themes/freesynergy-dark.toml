# FreeSynergy Default Theme — Dark (Cyan on Navy)
# This is the canonical house-style theme for all FreeSynergy applications.
# Load with: ThemeEngine::from_toml("themes/freesynergy-dark.toml")

name    = "FreeSynergy Dark"
version = "1.0.0"

[colors]
primary        = "#00BCD4"
primary_hover  = "#26C6DA"
primary_text   = "#000000"
secondary      = "#ffffff"
bg_base        = "#0d1117"
bg_surface     = "#161b22"
bg_sidebar     = "#0f3460"
text_primary   = "#e6edf3"
text_secondary = "#8b949e"
text_muted     = "#484f58"
success        = "#3fb950"
warning        = "#d29922"
error          = "#f85149"
border_default = "#30363d"
border_focus   = "#00BCD4"

[typography]
font_family = "\"JetBrains Mono\", \"Fira Code\", monospace"
font_size   = 14
line_height = 1.6

[spacing]
xs = 4
sm = 8
md = 16
lg = 24
xl = 32

[glass]
bg_opacity     = 0.08
blur           = 12
border_opacity = 0.15

[animation]
fast = 150
base = 250
slow = 400

[shadows]
sm = "0 1px 3px rgba(0,0,0,0.4)"
md = "0 4px 12px rgba(0,0,0,0.5)"
lg = "0 8px 24px rgba(0,0,0,0.6)"
xl = "0 16px 48px rgba(0,0,0,0.7)"
