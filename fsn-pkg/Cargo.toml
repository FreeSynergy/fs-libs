[package]
name        = "fsn-pkg"
description = "Package manager for FreeSynergy — OCI manifests, install lifecycle, event hooks"
version.workspace    = true
edition.workspace    = true
license.workspace    = true
authors.workspace    = true
repository.workspace = true

[features]
default = []
# OCI registry pull (requires reqwest)
oci     = ["dep:reqwest", "dep:tokio", "dep:tracing"]
# Package signature verification via Ed25519
signing = ["dep:fsn-crypto", "fsn-crypto/signing"]

[dependencies]
fsn-error  = { workspace = true }
serde      = { workspace = true }
serde_json = { workspace = true }
toml       = { workspace = true }

[dependencies.fsn-crypto]
workspace = true
optional  = true

[dependencies.reqwest]
workspace = true
optional  = true

[dependencies.tokio]
workspace = true
optional  = true

[dependencies.tracing]
workspace = true
optional  = true

[dev-dependencies]
tempfile = "3"
tokio    = { workspace = true }
