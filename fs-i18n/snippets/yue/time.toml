# time.toml — 時間表達 (Cantonese)

[time]
just_now     = "啱啱"
seconds_ago  = "{n} 秒前"
minutes_ago  = "{n} 分鐘前"
hours_ago    = "{n} 小時前"
days_ago     = "{n} 日前"
weeks_ago    = "{n} 星期前"
months_ago   = "{n} 個月前"
years_ago    = "{n} 年前"
today        = "今日"
yesterday    = "琴日"
tomorrow     = "聽日"
never        = "從未"

