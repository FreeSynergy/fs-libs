# validation.toml — Doğrulama mesajları (Türkçe)

[validation]
required          = "Zorunlu alan"
too_short         = "Çok kısa (minimum: {min} karakter)"
too_long          = "Çok uzun (maksimum: {max} karakter)"
invalid_email     = "Geçersiz e-posta adresi"
invalid_url       = "Geçersiz URL"
invalid_format    = "Geçersiz biçim"
out_of_range      = "Değer aralık dışında"
pattern_mismatch  = "Gerekli desenle eşleşmiyor"
already_exists    = "Zaten mevcut"
not_found         = "Bulunamadı"

