# time.toml — Relative time expressions (Swahili)

[time]
just_now = "sasa hivi"
seconds_ago = "sekunde {n} zilizopita"
minutes_ago = "dakika {n} zilizopita"
hours_ago = "saa {n} zilizopita"
days_ago = "siku {n} zilizopita"
weeks_ago = "wiki {n} zilizopita"
months_ago = "miezi {n} iliyopita"
years_ago = "miaka {n} iliyopita"
today = "leo"
yesterday = "jana"
tomorrow = "kesho"
never = "kamwe"

