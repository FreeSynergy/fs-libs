# validation.toml — validation messages (Ukrainian)

[validation]
required          = "Обов'язкове поле"
too_short         = "Занадто коротко (мінімум: {min} символів)"
too_long          = "Занадто довго (максимум: {max} символів)"
invalid_email     = "Невірна адреса електронної пошти"
invalid_url       = "Невірний URL"
invalid_format    = "Невірний формат"
out_of_range      = "Значення поза діапазоном"
pattern_mismatch  = "Не відповідає потрібному шаблону"
already_exists    = "Вже існує"
not_found         = "Не знайдено"

