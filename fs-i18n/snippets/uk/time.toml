# time.toml — relative time labels (Ukrainian)

[time]
just_now     = "щойно"
seconds_ago  = "{n} секунд тому"
minutes_ago  = "{n} хвилин тому"
hours_ago    = "{n} годин тому"
days_ago     = "{n} днів тому"
weeks_ago    = "{n} тижнів тому"
months_ago   = "{n} місяців тому"
years_ago    = "{n} років тому"
today        = "сьогодні"
yesterday    = "вчора"
tomorrow     = "завтра"
never        = "ніколи"

