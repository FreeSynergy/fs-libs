# time.toml — Relative time expressions (Portuguese)

[time]
just_now = "agora mesmo"
seconds_ago = "há {n} segundos"
minutes_ago = "há {n} minutos"
hours_ago = "há {n} horas"
days_ago = "há {n} dias"
weeks_ago = "há {n} semanas"
months_ago = "há {n} meses"
years_ago = "há {n} anos"
today = "hoje"
yesterday = "ontem"
tomorrow = "amanhã"
never = "nunca"

