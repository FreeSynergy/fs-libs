# validation.toml — Input validation messages (Tamil)

[validation]
required = "தேவையான புலம்"
too_short = "மிகவும் குறுகியது (குறைந்தபட்சம்: {min} எழுத்துகள்)"
too_long = "மிகவும் நீளமானது (அதிகபட்சம்: {max} எழுத்துகள்)"
invalid_email = "தவறான மின்னஞ்சல் முகவரி"
invalid_url = "தவறான URL"
invalid_format = "தவறான வடிவம்"
out_of_range = "மதிப்பு வரம்பிற்கு வெளியே"
pattern_mismatch = "தேவையான முறையுடன் பொருந்தவில்லை"
already_exists = "ஏற்கனவே உள்ளது"
not_found = "கண்டுபிடிக்கவில்லை"

