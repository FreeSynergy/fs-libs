# time.toml — Relative time expressions (Lithuanian)

[time]
just_now     = "ką tik"
seconds_ago  = "prieš {n} sekundes"
minutes_ago  = "prieš {n} minutes"
hours_ago    = "prieš {n} valandas"
days_ago     = "prieš {n} dienas"
weeks_ago    = "prieš {n} savaites"
months_ago   = "prieš {n} mėnesius"
years_ago    = "prieš {n} metus"
today        = "šiandien"
yesterday    = "vakar"
tomorrow     = "rytoj"
never        = "niekada"

