# time.toml — relative time labels (Russian)

[time]
just_now     = "только что"
seconds_ago  = "{n} секунд назад"
minutes_ago  = "{n} минут назад"
hours_ago    = "{n} часов назад"
days_ago     = "{n} дней назад"
weeks_ago    = "{n} недель назад"
months_ago   = "{n} месяцев назад"
years_ago    = "{n} лет назад"
today        = "сегодня"
yesterday    = "вчера"
tomorrow     = "завтра"
never        = "никогда"

