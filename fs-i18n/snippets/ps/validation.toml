# validation.toml — form validation messages (Pashto / پښتو)

[validation]
required          = "اړینه ساحه"
too_short         = "خورا لنډ (لږ تر لږه: {min} توري)"
too_long          = "خورا اوږد (ډیر تر ډیره: {max} توري)"
invalid_email     = "ناسم بریښنالیک پته"
invalid_url       = "ناسم URL"
invalid_format    = "ناسم بڼه"
out_of_range      = "ارزښت د حد نه بهر دی"
pattern_mismatch  = "د اړین نمونې سره سمون نه خوري"
already_exists    = "دمخه شتون لري"
not_found         = "ونه موندل شو"

