offline       = "آفلاین"
running       = "روان دی"
stopped       = "ودریدلی"
error         = "تیروتنه"
loading       = "پورته کیږي"
syncing       = "همغږي کیږي"
paused        = "ځنډول شوی"
degraded      = "خراب حالت"
healthy       = "روغ"
unhealthy     = "ناروغ"
pending       = "انتظار کې"
active        = "فعال"
