# time.toml — Relative and absolute time expressions (Swedish)

[time]
just_now = "Precis nu"
seconds_ago = "för {n} sekunder sedan"
minutes_ago = "för {n} minuter sedan"
hours_ago = "för {n} timmar sedan"
days_ago = "för {n} dagar sedan"
weeks_ago = "för {n} veckor sedan"
months_ago = "för {n} månader sedan"
years_ago = "för {n} år sedan"
today = "Idag"
yesterday = "Igår"
tomorrow = "Imorgon"
never = "Aldrig"

