# time.toml — Relative time expressions (Czech)

[time]
just_now = "právě teď"
seconds_ago = "před {n} sekundami"
minutes_ago = "před {n} minutami"
hours_ago = "před {n} hodinami"
days_ago = "před {n} dny"
weeks_ago = "před {n} týdny"
months_ago = "před {n} měsíci"
years_ago = "před {n} lety"
today = "dnes"
yesterday = "včera"
tomorrow = "zítra"
never = "nikdy"

