# validation.toml — Validation messages for form fields (Norwegian Bokmål)

[validation]
required = "Dette feltet er påkrevd"
too_short = "For kort"
too_long = "For lang"
invalid_email = "Ugyldig e-postadresse"
invalid_url = "Ugyldig URL"
invalid_format = "Ugyldig format"
out_of_range = "Verdi utenfor område"
pattern_mismatch = "Samsvarer ikke med påkrevd mønster"
already_exists = "Finnes allerede"
not_found = "Ikke funnet"

