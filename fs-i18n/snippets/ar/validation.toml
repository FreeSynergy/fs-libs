# validation.toml — form validation messages (Arabic / العربية)

[validation]
required          = "حقل مطلوب"
too_short         = "قصير جداً (الحد الأدنى: {min} أحرف)"
too_long          = "طويل جداً (الحد الأقصى: {max} أحرف)"
invalid_email     = "عنوان بريد إلكتروني غير صالح"
invalid_url       = "رابط غير صالح"
invalid_format    = "تنسيق غير صالح"
out_of_range      = "القيمة خارج النطاق"
pattern_mismatch  = "لا يطابق النمط المطلوب"
already_exists    = "موجود بالفعل"
not_found         = "غير موجود"

