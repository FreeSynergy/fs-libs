# time.toml — relative time expressions (Arabic / العربية)

[time]
just_now     = "الآن"
seconds_ago  = "منذ {n} ثوانٍ"
minutes_ago  = "منذ {n} دقائق"
hours_ago    = "منذ {n} ساعات"
days_ago     = "منذ {n} أيام"
weeks_ago    = "منذ {n} أسابيع"
months_ago   = "منذ {n} أشهر"
years_ago    = "منذ {n} سنوات"
today        = "اليوم"
yesterday    = "أمس"
tomorrow     = "غداً"
never        = "أبداً"

