# time.toml — 상대적 시간 표현 (Korean)

[time]
just_now     = "방금 전"
seconds_ago  = "{n}초 전"
minutes_ago  = "{n}분 전"
hours_ago    = "{n}시간 전"
days_ago     = "{n}일 전"
weeks_ago    = "{n}주 전"
months_ago   = "{n}개월 전"
years_ago    = "{n}년 전"
today        = "오늘"
yesterday    = "어제"
tomorrow     = "내일"
never        = "없음"

