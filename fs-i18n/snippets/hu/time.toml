# time.toml — Relative time expressions (Hungarian)

[time]
just_now = "éppen most"
seconds_ago = "{n} másodperce"
minutes_ago = "{n} perce"
hours_ago = "{n} órája"
days_ago = "{n} napja"
weeks_ago = "{n} hete"
months_ago = "{n} hónapja"
years_ago = "{n} éve"
today = "ma"
yesterday = "tegnap"
tomorrow = "holnap"
never = "soha"

