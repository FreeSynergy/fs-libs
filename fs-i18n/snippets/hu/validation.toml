# validation.toml — Form validation messages (Hungarian)

[validation]
required = "Kötelező mező"
too_short = "Túl rövid (minimum: {min} karakter)"
too_long = "Túl hosszú (maximum: {max} karakter)"
invalid_email = "Érvénytelen e-mail-cím"
invalid_url = "Érvénytelen URL"
invalid_format = "Érvénytelen formátum"
out_of_range = "Az érték tartományon kívül esik"
pattern_mismatch = "Nem egyezik a szükséges mintával"
already_exists = "Már létezik"
not_found = "Nem található"

