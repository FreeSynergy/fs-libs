# time.toml — Relative time expressions (Albanian)

[time]
just_now = "tani"
seconds_ago = "para {n} sekondash"
minutes_ago = "para {n} minutash"
hours_ago = "para {n} orësh"
days_ago = "para {n} ditësh"
weeks_ago = "para {n} javësh"
months_ago = "para {n} muajsh"
years_ago = "para {n} vjetësh"
today = "sot"
yesterday = "dje"
tomorrow = "nesër"
never = "kurrë"

