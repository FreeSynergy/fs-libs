# time.toml — Relative time expressions (Latvian)

[time]
just_now     = "tikko"
seconds_ago  = "pirms {n} sekundēm"
minutes_ago  = "pirms {n} minūtēm"
hours_ago    = "pirms {n} stundām"
days_ago     = "pirms {n} dienām"
weeks_ago    = "pirms {n} nedēļām"
months_ago   = "pirms {n} mēnešiem"
years_ago    = "pirms {n} gadiem"
today        = "šodien"
yesterday    = "vakar"
tomorrow     = "rīt"
never        = "nekad"

