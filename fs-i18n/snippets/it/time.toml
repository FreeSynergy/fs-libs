# time.toml — Relative time expressions (Italian)

[time]
just_now = "proprio ora"
seconds_ago = "{n} secondi fa"
minutes_ago = "{n} minuti fa"
hours_ago = "{n} ore fa"
days_ago = "{n} giorni fa"
weeks_ago = "{n} settimane fa"
months_ago = "{n} mesi fa"
years_ago = "{n} anni fa"
today = "oggi"
yesterday = "ieri"
tomorrow = "domani"
never = "mai"

