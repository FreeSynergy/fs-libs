# time.toml — Time and date expressions (Slovenian)

[time]
just_now     = "ravnokar"
seconds_ago  = "pred {n} sekundami"
minutes_ago  = "pred {n} minutami"
hours_ago    = "pred {n} urami"
days_ago     = "pred {n} dnevi"
weeks_ago    = "pred {n} tedni"
months_ago   = "pred {n} meseci"
years_ago    = "pred {n} leti"
today        = "danes"
yesterday    = "včeraj"
tomorrow     = "jutri"
never        = "nikoli"

