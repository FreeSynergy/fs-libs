# time.toml — Relative time expressions and date labels (Basa Jawa)

[time]
just_now = "mentas wae"
seconds_ago = "{n} detik kepungkur"
minutes_ago = "{n} menit kepungkur"
hours_ago = "{n} jam kepungkur"
days_ago = "{n} dina kepungkur"
weeks_ago = "{n} minggu kepungkur"
months_ago = "{n} sasi kepungkur"
years_ago = "{n} taun kepungkur"
today = "dina iki"
yesterday = "wingi"
tomorrow = "sesuk"
never = "ora tau"

