# time.toml — Relative time expressions (Romanian)

[time]
just_now = "chiar acum"
seconds_ago = "acum {n} secunde"
minutes_ago = "acum {n} minute"
hours_ago = "acum {n} ore"
days_ago = "acum {n} zile"
weeks_ago = "acum {n} săptămâni"
months_ago = "acum {n} luni"
years_ago = "acum {n} ani"
today = "astăzi"
yesterday = "ieri"
tomorrow = "mâine"
never = "niciodată"

