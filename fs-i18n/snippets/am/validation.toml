# validation.toml — Validation messages (Amharic)

[validation]
required = "አስፈላጊ መስክ"
too_short = "በጣም አጭር ነው (ዝቅተኛ፡ {min} ቁምፊዎች)"
too_long = "በጣም ረጅም ነው (ከፍተኛ፡ {max} ቁምፊዎች)"
