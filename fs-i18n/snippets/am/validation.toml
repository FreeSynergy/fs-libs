invalid_url = "URL ልክ አይደለም"
invalid_format = "ቅርጸቱ ልክ አይደለም"
out_of_range = "ዋጋው ከወሰን ውጭ ነው"
pattern_mismatch = "ከሚፈለገው ቅርጸት ጋር አይዛመድም"
already_exists = "አስቀድሞ አለ"
not_found = "አልተገኘም"

