# time.toml — Relative time expressions (Amharic)

[time]
just_now = "አሁኑኑ"
seconds_ago = "ከ{n} ሰከንድ በፊት"
minutes_ago = "ከ{n} ደቂቃ በፊት"
hours_ago = "ከ{n} ሰዓት በፊት"
days_ago = "ከ{n} ቀን በፊት"
weeks_ago = "ከ{n} ሳምንት በፊት"
months_ago = "ከ{n} ወር በፊት"
years_ago = "ከ{n} ዓመት በፊት"
today = "ዛሬ"
yesterday = "ትናንት"
tomorrow = "ነገ"
never = "ፈጽሞ"

