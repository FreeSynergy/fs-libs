offline       = "オフライン"
running       = "実行中"
stopped       = "停止中"
error         = "エラー"
loading       = "読み込み中"
syncing       = "同期中"
paused        = "一時停止"
degraded      = "低下"
healthy       = "正常"
unhealthy     = "異常"
pending       = "保留中"
active        = "アクティブ"
