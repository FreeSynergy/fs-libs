# time.toml — Time and date expressions (Finnish)

[time]
just_now     = "juuri nyt"
seconds_ago  = "{n} sekuntia sitten"
minutes_ago  = "{n} minuuttia sitten"
hours_ago    = "{n} tuntia sitten"
days_ago     = "{n} päivää sitten"
weeks_ago    = "{n} viikkoa sitten"
months_ago   = "{n} kuukautta sitten"
years_ago    = "{n} vuotta sitten"
today        = "tänään"
yesterday    = "eilen"
tomorrow     = "huomenna"
never        = "ei koskaan"

