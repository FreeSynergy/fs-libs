# time.toml — Relative time expressions (Croatian)

[time]
just_now = "upravo sada"
seconds_ago = "prije {n} sekundi"
minutes_ago = "prije {n} minuta"
hours_ago = "prije {n} sati"
days_ago = "prije {n} dana"
weeks_ago = "prije {n} tjedana"
months_ago = "prije {n} mjeseci"
years_ago = "prije {n} godina"
today = "danas"
yesterday = "jučer"
tomorrow = "sutra"
never = "nikad"

