# time.toml — Label waktu relatif (Bahasa Indonesia)

[time]
just_now     = "baru saja"
seconds_ago  = "{n} detik lalu"
minutes_ago  = "{n} menit lalu"
hours_ago    = "{n} jam lalu"
days_ago     = "{n} hari lalu"
weeks_ago    = "{n} minggu lalu"
months_ago   = "{n} bulan lalu"
years_ago    = "{n} tahun lalu"
today        = "hari ini"
yesterday    = "kemarin"
tomorrow     = "besok"
never        = "tidak pernah"

