# validation.toml — Validation messages (Marathi)

[validation]
required = "आवश्यक फील्ड"
too_short = "खूप छोटे (किमान: {min} अक्षरे)"
too_long = "खूप मोठे (कमाल: {max} अक्षरे)"
invalid_email = "अवैध ईमेल पत्ता"
invalid_url = "अवैध URL"
invalid_format = "अवैध स्वरूप"
out_of_range = "मूल्य सीमेबाहेर आहे"
pattern_mismatch = "आवश्यक नमुन्याशी जुळत नाही"
already_exists = "आधीच अस्तित्वात आहे"
not_found = "सापडले नाही"

