# validation.toml — Validation messages (Punjabi)

[validation]
required = "ਲੋੜੀਂਦਾ ਖੇਤਰ"
too_short = "ਬਹੁਤ ਛੋਟਾ (ਘੱਟੋ-ਘੱਟ: {min} ਅੱਖਰ)"
too_long = "ਬਹੁਤ ਲੰਬਾ (ਵੱਧ ਤੋਂ ਵੱਧ: {max} ਅੱਖਰ)"
invalid_email = "ਅਵੈਧ ਈਮੇਲ ਪਤਾ"
invalid_url = "ਅਵੈਧ URL"
invalid_format = "ਅਵੈਧ ਫਾਰਮੈਟ"
out_of_range = "ਮੁੱਲ ਸੀਮਾ ਤੋਂ ਬਾਹਰ ਹੈ"
pattern_mismatch = "ਲੋੜੀਂਦੇ ਪੈਟਰਨ ਨਾਲ ਮੇਲ ਨਹੀਂ ਖਾਂਦਾ"
already_exists = "ਪਹਿਲਾਂ ਤੋਂ ਮੌਜੂਦ ਹੈ"
not_found = "ਨਹੀਂ ਮਿਲਿਆ"

