# validation.toml — form validation messages (Persian / فارسی)

[validation]
required          = "فیلد الزامی"
too_short         = "خیلی کوتاه (حداقل: {min} کاراکتر)"
too_long          = "خیلی بلند (حداکثر: {max} کاراکتر)"
invalid_email     = "آدرس ایمیل نامعتبر"
invalid_url       = "آدرس URL نامعتبر"
invalid_format    = "قالب نامعتبر"
out_of_range      = "مقدار خارج از محدوده"
pattern_mismatch  = "با الگوی مورد نیاز مطابقت ندارد"
already_exists    = "از قبل وجود دارد"
not_found         = "یافت نشد"

