# validation.toml — ข้อความตรวจสอบความถูกต้อง (ภาษาไทย)

[validation]
required         = "ฟิลด์ที่จำเป็น"
too_short        = "สั้นเกินไป (ขั้นต่ำ: {min} อักขระ)"
too_long         = "ยาวเกินไป (สูงสุด: {max} อักขระ)"
invalid_email    = "ที่อยู่อีเมลไม่ถูกต้อง"
invalid_url      = "URL ไม่ถูกต้อง"
invalid_format   = "รูปแบบไม่ถูกต้อง"
out_of_range     = "ค่าอยู่นอกช่วงที่กำหนด"
pattern_mismatch = "ไม่ตรงกับรูปแบบที่กำหนด"
already_exists   = "มีอยู่แล้ว"
not_found        = "ไม่พบข้อมูล"

