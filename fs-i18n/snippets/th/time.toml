# time.toml — ป้ายกำกับเวลาสัมพัทธ์ (ภาษาไทย)

[time]
just_now     = "เมื่อกี้"
seconds_ago  = "{n} วินาทีที่แล้ว"
minutes_ago  = "{n} นาทีที่แล้ว"
hours_ago    = "{n} ชั่วโมงที่แล้ว"
days_ago     = "{n} วันที่แล้ว"
weeks_ago    = "{n} สัปดาห์ที่แล้ว"
months_ago   = "{n} เดือนที่แล้ว"
years_ago    = "{n} ปีที่แล้ว"
today        = "วันนี้"
yesterday    = "เมื่อวาน"
tomorrow     = "พรุ่งนี้"
never        = "ไม่เคย"

