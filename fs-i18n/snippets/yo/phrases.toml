select_item = "Yan nǹkan kan"
no_results = "A kò rí àbájáde kankan"
loading_data = "Ń gbé data wọlé…"
operation_successful = "Ìṣẹ̀ṣẹ̀ yọrí sí àṣeyọrí"
operation_failed = "Ìṣẹ̀ṣẹ̀ kùnà"
are_you_sure = "Ṣé o dájú?"
welcome_to = "Káàbọ̀ sí"
unsaved_changes = "O ní àwọn ìyípadà tí a kò tí ì tọ́jú"
try_again = "Jọ̀wọ́ gbìyànjú lẹ́ẹ̀kan sí"
contact_support = "Jọ̀wọ́ kàn sí àwọn ìrànlọ́wọ́"

