# validation.toml — Validation messages (English)

[validation]
required           = "{field} is required."
too_short          = "{field} must be at least {min} characters."
too_long           = "{field} must be at most {max} characters."
invalid_format     = "{field} has an invalid format."
already_exists     = "{field} already exists."
not_available      = "{field} is not available."
must_be_unique     = "{field} must be unique."
invalid_email      = "Please enter a valid email address."
invalid_url        = "Please enter a valid URL."
invalid_domain     = "Please enter a valid domain name."
invalid_port       = "Port must be a number between 1 and 65535."
invalid_version    = "Please enter a valid version (e.g. 1.0.0)."
no_special_chars   = "{field} must not contain special characters."
only_alphanumeric  = "{field} may only contain letters and numbers."
passwords_mismatch = "Passwords do not match."
