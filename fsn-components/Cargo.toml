[package]
name        = "fsn-components"
description = "FreeSynergy UI component library — Dioxus primitives for Desktop + Web"
version.workspace   = true
edition.workspace   = true
license.workspace   = true

[features]
default  = []
# Activates Dioxus components (Button, Input, FormField, etc.)
dioxus   = ["dep:dioxus"]
desktop  = ["dioxus", "dep:dioxus", "dioxus/desktop"]
web      = ["dioxus", "dep:dioxus", "dioxus/web"]

[dependencies]
tokio  = { workspace = true, features = ["sync"] }
dioxus = { workspace = true, optional = true }
